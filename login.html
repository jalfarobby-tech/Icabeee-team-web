<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Login — ICABEEE TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0D0D12; --muted:#8B8B96; --coral:#FF5C39; --gold:#f5a020;
    --df:'Sora',sans-serif; --di:'Inter',sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{
    font-family:var(--di);
    background:linear-gradient(165deg,#2a1c3f 0%,#1a1130 45%,#0a0714 100%);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px; overflow-x:hidden; position:relative;
  }
  .glow{ position:fixed; border-radius:50%; filter:blur(60px); pointer-events:none; animation:drift 10s ease-in-out infinite alternate; }
  .glow1{ width:280px; height:280px; top:-80px; right:-60px; background:radial-gradient(circle,rgba(255,92,57,.45),transparent 70%); }
  .glow2{ width:320px; height:320px; bottom:-100px; left:-80px; background:radial-gradient(circle,rgba(139,92,246,.4),transparent 70%); animation-delay:-4s; }
  @keyframes drift{ to{ transform:translate(20px,16px) scale(1.1); } }

  .card{
    position:relative; z-index:2; width:100%; max-width:380px;
    background:rgba(255,255,255,.98); border-radius:26px;
    padding:36px 28px; box-shadow:0 30px 80px rgba(0,0,0,.5);
    animation:cardIn .6s var(--ease);
  }
  @keyframes cardIn{ from{opacity:0; transform:translateY(24px) scale(.96);} to{opacity:1; transform:none;} }

  .badge{
    width:52px; height:52px; border-radius:16px; margin:0 auto 18px;
    background:linear-gradient(135deg,var(--coral),var(--gold));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 24px rgba(255,92,57,.35);
  }
  .badge svg{ width:26px; height:26px; }
  .title{ font-family:var(--df); font-weight:800; font-size:1.25rem; text-align:center; color:var(--ink); }
  .sub{ text-align:center; color:var(--muted); font-size:.82rem; margin-top:4px; margin-bottom:28px; }

  .field{ position:relative; margin-bottom:16px; }
  .field label{ font-size:.76rem; font-weight:700; color:var(--ink); display:block; margin-bottom:6px; }
  .field .input-wrap{ position:relative; }
  .field svg{ position:absolute; left:14px; top:50%; transform:translateY(-50%); width:17px; height:17px; color:var(--muted); }
  input{
    width:100%; padding:13px 14px 13px 40px; border-radius:13px; border:1.5px solid #ECECEF;
    font-family:var(--di); font-size:.92rem; outline:none; background:#FAFAFB;
    transition:border-color .2s, background .2s;
  }
  input:focus{ border-color:var(--coral); background:#fff; }

  button.submit{
    width:100%; padding:14px; border:none; border-radius:14px; cursor:pointer;
    background:linear-gradient(135deg,var(--coral),var(--gold)); color:#fff;
    font-family:var(--df); font-weight:700; font-size:.92rem; margin-top:6px;
    box-shadow:0 10px 26px rgba(255,92,57,.3);
    transition:transform .15s, opacity .2s;
  }
  button.submit:active{ transform:scale(.98); }
  button.submit:disabled{ opacity:.6; cursor:not-allowed; }

  .err{
    background:#FEF2F2; color:#DC2626; font-size:.78rem; padding:11px 13px;
    border-radius:11px; margin-bottom:16px; display:none; animation:shake .4s;
  }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }

  .loader-wrap{ display:none; text-align:center; padding:20px 0; }
  .spinner{
    width:28px; height:28px; border:3px solid #F0F0F0; border-top-color:var(--coral);
    border-radius:50%; margin:0 auto 10px; animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .loader-wrap p{ color:var(--muted); font-size:.8rem; }
</style>
</head>
<body>
  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <div class="card">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 3 7v6c0 5 4 8.5 9 9 5-.5 9-4 9-9V7l-9-5Z"/></svg>
    </div>
    <div class="title">ICABEEE TEAM</div>
    <div class="sub">Masuk untuk lanjut ke dashboard kamu</div>

    <div class="err" id="errBox"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m4 6 8 6 8-6"/><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
          <input type="email" id="email" required autocomplete="username" placeholder="nama@email.com">
        </div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
        </div>
      </div>
      <button type="submit" class="submit" id="loginBtn">Masuk</button>
    </form>

    <div class="loader-wrap" id="loader">
      <div class="spinner"></div>
      <p>Memuat akun kamu…</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB2Fczb4wGbF9ah0mQuuZi8WWaim_hQB4M",
      authDomain: "icabeee-team-app.firebaseapp.com",
      projectId: "icabeee-team-app",
      storageBucket: "icabeee-team-app.firebasestorage.app",
      messagingSenderId: "71257065015",
      appId: "1:71257065015:web:783a2515d48763aec361b2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById('loginForm');
    const errBox = document.getElementById('errBox');
    const loginBtn = document.getElementById('loginBtn');
    const loader = document.getElementById('loader');

    function showError(msg) {
      errBox.textContent = msg;
      errBox.style.display = 'block';
    }

    async function redirectByRole(uid) {
      loader.style.display = 'block';
      form.style.display = 'none';
      const snap = await getDoc(doc(db, 'users', uid));
      if (!snap.exists()) {
        showError('Akun kamu belum terdaftar di sistem. Hubungi owner.');
        loader.style.display = 'none';
        form.style.display = 'block';
        return;
      }
      window.location.href = snap.data().role === 'owner' ? 'dashboard-owner.html' : 'dashboard-karyawan.html';
    }

    onAuthStateChanged(auth, (user) => { if (user) redirectByRole(user.uid); });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Memproses…';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        await redirectByRole(cred.user.uid);
      } catch (err) {
        let msg = 'Email atau password salah.';
        if (err.code === 'auth/too-many-requests') msg = 'Terlalu banyak percobaan. Coba lagi nanti.';
        if (err.code === 'auth/user-disabled') msg = 'Akun ini dinonaktifkan.';
        showError(msg);
        loginBtn.disabled = false;
        loginBtn.textContent = 'Masuk';
      }
    });
  </script>
</body>
</html>
